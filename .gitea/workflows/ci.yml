name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [master]

jobs:
  go-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.11.2

      - name: Lint
        run: golangci-lint run ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build unified binary
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/nexara

  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [go-ci, frontend-ci]
    steps:
      - uses: actions/checkout@v4

      - name: Build unified image
        run: |
          docker build \
            -f docker/nexara/Dockerfile \
            -t nexara:ci \
            .
