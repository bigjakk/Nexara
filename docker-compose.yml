services:
  # ---- PostgreSQL 16 + TimescaleDB ----
  nexara-db:
    image: timescale/timescaledb:latest-pg16
    container_name: nexara-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-nexara}
    ports:
      - "5432:5432"
    volumes:
      - nexara-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexara}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---- Redis 7 ----
  nexara-redis:
    image: redis:7-alpine
    container_name: nexara-redis
    ports:
      - "6379:6379"
    volumes:
      - nexara-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---- Go API Server ----
  nexara-api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: nexara-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://nexara:changeme@nexara-db:5432/nexara?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://nexara-redis:6379/0}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      API_PORT: ${API_PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      nexara-db:
        condition: service_healthy
      nexara-redis:
        condition: service_healthy
    restart: unless-stopped

  # ---- WebSocket Server ----
  nexara-ws:
    build:
      context: .
      dockerfile: docker/ws/Dockerfile
    container_name: nexara-ws
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://nexara:changeme@nexara-db:5432/nexara?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://nexara-redis:6379/0}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      WS_PORT: ${WS_PORT:-8081}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      nexara-api:
        condition: service_healthy
      nexara-redis:
        condition: service_healthy
    restart: unless-stopped

  # ---- Metric Collector ----
  nexara-collector:
    build:
      context: .
      dockerfile: docker/collector/Dockerfile
    container_name: nexara-collector
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://nexara:changeme@nexara-db:5432/nexara?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://nexara-redis:6379/0}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      METRICS_COLLECT_INTERVAL: ${METRICS_COLLECT_INTERVAL:-10s}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      nexara-api:
        condition: service_healthy
    restart: unless-stopped

  # ---- Task Scheduler ----
  nexara-scheduler:
    build:
      context: .
      dockerfile: docker/scheduler/Dockerfile
    container_name: nexara-scheduler
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://nexara:changeme@nexara-db:5432/nexara?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://nexara-redis:6379/0}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SCHEDULER_TICK: ${SCHEDULER_TICK:-60s}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      nexara-api:
        condition: service_healthy
    restart: unless-stopped

  # ---- React Frontend ----
  nexara-frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: nexara-frontend
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ---- Caddy Reverse Proxy ----
  nexara-proxy:
    image: caddy:2-alpine
    container_name: nexara-proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      NEXARA_DOMAIN: ${NEXARA_DOMAIN:-localhost}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - nexara-caddy-data:/data
      - nexara-caddy-config:/config
    depends_on:
      - nexara-api
      - nexara-ws
      - nexara-frontend
    restart: unless-stopped

volumes:
  nexara-db-data:
  nexara-redis-data:
  nexara-caddy-data:
  nexara-caddy-config:
