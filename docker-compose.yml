services:
  # ---- PostgreSQL 16 + TimescaleDB ----
  nexara-db:
    image: timescale/timescaledb:latest-pg16
    container_name: nexara-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-nexara}
    volumes:
      - nexara-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexara}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---- Redis 7 ----
  nexara-redis:
    image: redis:7-alpine
    container_name: nexara-redis
    volumes:
      - nexara-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---- Nexara (unified: API + WS + Collector + Scheduler + Frontend) ----
  nexara:
    image: ghcr.io/bigjakk/nexara:${NEXARA_VERSION:-latest}
    container_name: nexara
    ports:
      - "80:8080"
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      DATABASE_URL: postgres://${POSTGRES_USER:-nexara}:${POSTGRES_PASSWORD:-changeme}@nexara-db:5432/${POSTGRES_DB:-nexara}?sslmode=disable
      REDIS_URL: ${REDIS_URL:-redis://nexara-redis:6379/0}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      METRICS_COLLECT_INTERVAL: ${METRICS_COLLECT_INTERVAL:-10s}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - nexara-data:/data/nexara
    healthcheck:
      test: ["CMD", "/nexara", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 15
      start_period: 30s
    depends_on:
      nexara-db:
        condition: service_healthy
      nexara-redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  nexara-db-data:
  nexara-redis-data:
  nexara-data:
