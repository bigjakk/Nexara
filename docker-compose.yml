services:
  # ---- PostgreSQL 16 + TimescaleDB ----
  nexara-db:
    image: timescale/timescaledb:latest-pg16
    container_name: nexara-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexara}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-nexara}
    ports:
      - "5432:5432"
    volumes:
      - ${DATA_DIR:-nexara-db-data}${DATA_DIR:+/db}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexara}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    networks:
      - backend
    restart: unless-stopped

  # ---- Redis 7 ----
  nexara-redis:
    image: redis:7-alpine
    container_name: nexara-redis
    volumes:
      - ${DATA_DIR:-nexara-redis-data}${DATA_DIR:+/redis}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - backend
    restart: unless-stopped

  # ---- Nexara (unified: API + WS + Collector + Scheduler + Frontend) ----
  nexara:
    image: ghcr.io/bigjakk/nexara:${NEXARA_VERSION:-latest}
    container_name: nexara
    ports:
      - "80:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://nexara:changeme@nexara-db:5432/nexara?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://nexara-redis:6379/0}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      API_PORT: ${API_PORT:-8080}
      METRICS_COLLECT_INTERVAL: ${METRICS_COLLECT_INTERVAL:-10s}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ${DATA_DIR:-nexara-data}${DATA_DIR:+/data}:/data/nexara
    read_only: true
    tmpfs:
      - /tmp:size=256M
    healthcheck:
      test: ["CMD", "/nexara", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 15
      start_period: 30s
    depends_on:
      nexara-db:
        condition: service_healthy
      nexara-redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "4"
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    driver: bridge

volumes:
  nexara-db-data:
  nexara-redis-data:
  nexara-data:
