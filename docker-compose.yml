services:
  # ---- PostgreSQL 16 + TimescaleDB ----
  proxdash-db:
    image: timescale/timescaledb:latest-pg16
    container_name: proxdash-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-proxdash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-proxdash}
    ports:
      - "5432:5432"
    volumes:
      - proxdash-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-proxdash}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---- Redis 7 ----
  proxdash-redis:
    image: redis:7-alpine
    container_name: proxdash-redis
    ports:
      - "6379:6379"
    volumes:
      - proxdash-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---- Go API Server ----
  proxdash-api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: proxdash-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://proxdash:changeme@proxdash-db:5432/proxdash?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://proxdash-redis:6379/0}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      API_PORT: ${API_PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      proxdash-db:
        condition: service_healthy
      proxdash-redis:
        condition: service_healthy
    restart: unless-stopped

  # ---- WebSocket Server ----
  proxdash-ws:
    build:
      context: .
      dockerfile: docker/ws/Dockerfile
    container_name: proxdash-ws
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://proxdash:changeme@proxdash-db:5432/proxdash?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://proxdash-redis:6379/0}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      WS_PORT: ${WS_PORT:-8081}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      proxdash-api:
        condition: service_healthy
      proxdash-redis:
        condition: service_healthy
    restart: unless-stopped

  # ---- Metric Collector ----
  proxdash-collector:
    build:
      context: .
      dockerfile: docker/collector/Dockerfile
    container_name: proxdash-collector
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://proxdash:changeme@proxdash-db:5432/proxdash?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://proxdash-redis:6379/0}
      COLLECT_INTERVAL: ${COLLECT_INTERVAL:-30s}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      proxdash-api:
        condition: service_healthy
    restart: unless-stopped

  # ---- Task Scheduler ----
  proxdash-scheduler:
    build:
      context: .
      dockerfile: docker/scheduler/Dockerfile
    container_name: proxdash-scheduler
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://proxdash:changeme@proxdash-db:5432/proxdash?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://proxdash-redis:6379/0}
      SCHEDULER_TICK: ${SCHEDULER_TICK:-60s}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      proxdash-api:
        condition: service_healthy
    restart: unless-stopped

  # ---- React Frontend ----
  proxdash-frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: proxdash-frontend
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ---- Caddy Reverse Proxy ----
  proxdash-proxy:
    image: caddy:2-alpine
    container_name: proxdash-proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      PROXDASH_DOMAIN: ${PROXDASH_DOMAIN:-localhost}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - proxdash-caddy-data:/data
      - proxdash-caddy-config:/config
    depends_on:
      - proxdash-api
      - proxdash-ws
      - proxdash-frontend
    restart: unless-stopped

volumes:
  proxdash-db-data:
  proxdash-redis-data:
  proxdash-caddy-data:
  proxdash-caddy-config:
